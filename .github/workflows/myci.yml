name: my_first_ci
on:
  pull_request:
  push:
    branches: [main]


jobs:
  ci_job:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Load Virtual Machine
        uses: actions/checkout@v4
      - name : setup node
        uses : actions/setup-node@v4
      - name : Install Dependency
        run : npm install
      - name : Run index.js
        run : node index.js
  
        
